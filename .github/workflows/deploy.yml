# GitHub Pages에 Next.js 사이트를 배포하기 위한 워크플로우

name: Deploy Next.js site to Pages

on:
  # main 브랜치에 push가 발생했을 때 실행됩니다.
  push:
    branches: ["main"]
  # Actions 탭에서 수동으로 이 워크플로우를 실행할 수 있게 합니다.
  workflow_dispatch:

# GITHUB_TOKEN의 권한을 설정하여 배포를 허용합니다.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 실행되도록 설정합니다.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 빌드 작업
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build with Next.js
        run: npm run build
      - name: Upload artifact
        # 🚨 중요: Pages 배포 전용 액션으로 변경
        uses: actions/upload-pages-artifact@v3
        with:
          # 🚨 중요: Next.js 정적 빌드 결과물 폴더인 'out'으로 경로 수정
          path: ./out

  # 배포 작업
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # 🚨 중요: 다운로드 과정 없이 바로 배포하도록 수정
        uses: actions/deploy-pages@v4