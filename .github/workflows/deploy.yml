# GitHub Pages에 Vite + React 포트폴리오 사이트를 배포하기 위한 워크플로우

name: Deploy Portfolio to Pages

on:
  # main 브랜치에 push가 발생했을 때 실행됩니다.
  push:
    branches: ["main"]
  # Actions 탭에서 수동으로 이 워크플로우를 실행할 수 있게 합니다.
  workflow_dispatch:

# GITHUB_TOKEN의 권한을 설정하여 배포를 허용합니다.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 실행되도록 설정합니다.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 빌드 작업
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint check
        run: npm run lint
      - name: Build with Vite
        run: npm run build
      - name: Upload artifact
        # Vite 빌드 결과물은 'dist' 폴더에 생성됩니다
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 배포 작업
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4